name: Options Flow Scanner

on:
  schedule:
    - cron: "*/5 14-20 * * 1-5"    # Every 5 min, 10am–4pm ET (UTC-4)
    - cron: "0 13 * * 1-5"          # Pre-market scan 9am ET
    - cron: "30 20 * * 1-5"         # After-hours scan 4:30pm ET
    - cron: "0 20 * * 5"            # Weekly summary every Friday 4pm ET
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
  GOOGLE_OPTIONS_SHEET_ID: ${{ secrets.GOOGLE_OPTIONS_SHEET_ID }}

jobs:
  scan:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '*/5 14-20 * * 1-5' ||
      github.event.schedule == '0 13 * * 1-5' ||
      github.event.schedule == '30 20 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run scanner
        run: |
          if [ "${{ github.event.schedule }}" = "0 13 * * 1-5" ]; then
            python options_flow_scanner.py --premarket
          elif [ "${{ github.event.schedule }}" = "30 20 * * 1-5" ]; then
            python options_flow_scanner.py --afterhours
          else
            python options_flow_scanner.py
          fi
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_OPTIONS_SHEET_ID: ${{ secrets.GOOGLE_OPTIONS_SHEET_ID }}

  weekly-summary:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 20 * * 5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python weekly_summary.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_OPTIONS_SHEET_ID: ${{ secrets.GOOGLE_OPTIONS_SHEET_ID }}
